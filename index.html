<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>NexWebi — Next Generation Web Agency</title>
    <meta name="description" content="NexWebi builds modern websites, automation systems, and scalable SaaS platforms. Premium digital solutions engineered for performance and growth." />
    <meta name="keywords" content="web agency, web development, SaaS development, automation, AI integration, digital products" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nexwebi.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nexwebi.com/" />
    <meta property="og:title" content="NexWebi — Next Generation Web Agency" />
    <meta property="og:description" content="We build modern websites, automation systems, and scalable SaaS platforms engineered for performance and growth." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NexWebi — Next Generation Web Agency" />
    <meta name="twitter:description" content="Modern websites, automation systems, and scalable SaaS platforms." />

    <!-- Security headers (meta fallbacks — prefer server-side headers) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
